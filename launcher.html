<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Деревянная Деревня — Лаунчер</title>
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Philosopher:ital,wght@0,400;0,700;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --wood-dark:   #2a1a0a;
  --wood-mid:    #3d2510;
  --wood-light:  #5c3a1e;
  --wood-plank:  #6b4423;
  --plank-hi:    #7d5535;
  --bark:        #4a2e12;
  --straw:       #c8a84b;
  --straw-light: #e2c97e;
  --parchment:   #f0e6c8;
  --parchment2:  #d4c49a;
  --ink:         #1a0e06;
  --ink-soft:    #3d2a10;
  --moss:        #4a6b2a;
  --moss-light:  #6b9e3a;
  --rust:        #8b3a1a;
  --ember:       #c84a0a;
  --lantern:     #f5a020;
  --lantern-glow:#ffe066;
  --sky:         #7ab3d4;
  --muted:       #8a6a40;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height: 100%; width: 100%; overflow-x: hidden; }

body {
  background-color: var(--wood-dark);
  background-image:
    url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9 0.05' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"),
    repeating-linear-gradient(175deg,
      transparent 0px, transparent 28px,
      rgba(0,0,0,0.07) 29px, rgba(0,0,0,0.07) 30px,
      transparent 31px, transparent 58px,
      rgba(255,200,100,0.03) 59px, rgba(255,200,100,0.03) 60px
    );
  color: var(--parchment);
  font-family: 'Philosopher', serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(245,160,32,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 85% 5%,  rgba(245,160,32,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 80% 50% at 50% 100%, rgba(42,26,10,0.8) 0%, transparent 70%);
}

.leaves { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.leaf {
  position:absolute; top:-30px; opacity:0;
  animation: leaf-fall linear infinite;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
}
@keyframes leaf-fall {
  0%   { transform:translateY(0) rotate(0deg) translateX(0); opacity:0; }
  5%   { opacity:0.8; }
  50%  { transform:translateY(50vh) rotate(180deg) translateX(40px); }
  95%  { opacity:0.5; }
  100% { transform:translateY(105vh) rotate(360deg) translateX(-20px); opacity:0; }
}

.wrapper { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; min-height:100vh; overflow:hidden; max-width:100vw; }

/* === HEADER === */
header {
  position:sticky; top:0; z-index:200;
  background:
    repeating-linear-gradient(180deg,
      var(--wood-plank) 0px, var(--wood-plank) 48px,
      var(--bark) 48px, var(--bark) 52px,
      var(--wood-plank) 52px, var(--wood-plank) 100px
    );
  border-bottom: 4px solid var(--wood-dark);
  box-shadow: 0 6px 30px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,200,100,0.1);
  padding: 0 16px;
  display:flex; align-items:center; justify-content:space-between;
  height:72px; width:100%; max-width:100%; overflow:hidden;
}
.logo-sign {
  background:var(--wood-dark);
  border:3px solid var(--straw);
  border-radius:8px;
  padding:8px 20px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.5), 0 2px 0 var(--bark);
  position:relative;
}
.logo-sign::before {
  content:'';
  position:absolute; inset:3px;
  border:1px solid rgba(200,168,75,0.3);
  border-radius:4px; pointer-events:none;
}
.logo-title {
  font-family:'Rye', cursive;
  font-size:18px; color:var(--lantern-glow);
  text-shadow:0 0 20px rgba(255,224,102,0.6), 0 2px 4px rgba(0,0,0,0.8);
  letter-spacing:0.05em; white-space:nowrap;
}
.logo-sub {
  font-family:'IM Fell English',serif;
  font-style:italic; font-size:10px;
  color:var(--straw); letter-spacing:0.15em;
  text-align:center; margin-top:2px; opacity:0.7;
}
.lanterns { display:flex; gap:8px; align-items:center; }
.lantern-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  cursor:pointer; transition:transform 0.2s;
  padding:4px 10px; border-radius:6px;
  border:2px solid transparent;
}
.lantern-item:hover { transform:translateY(-2px); }
.lantern-item.active {
  border-color:var(--straw);
  background:rgba(200,168,75,0.08);
}
.lantern-body { font-size:22px; }
.lantern-label { font-size:9px; color:var(--straw); letter-spacing:0.1em; text-transform:uppercase; font-family:'IM Fell English',serif; }

/* === HOME VIEW === */
.home-view { flex:1; padding:40px 32px; display:flex; flex-direction:column; gap:40px; overflow-x:hidden; max-width:100%; }

@keyframes appear {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

.hero { text-align:center; animation:appear 0.8s ease both; }
.hero-board {
  display:inline-block;
  background:
    repeating-linear-gradient(90deg,
      var(--wood-mid) 0px, var(--wood-mid) 90px,
      var(--bark) 90px, var(--bark) 94px
    );
  border:4px solid var(--wood-dark);
  border-radius:6px;
  padding:28px 56px;
  box-shadow:8px 8px 0 var(--wood-dark), inset 0 2px 10px rgba(0,0,0,0.5);
  position:relative;
}
.hero-board::before, .hero-board::after {
  content:'◆'; position:absolute; color:var(--straw); font-size:12px; top:10px;
}
.hero-board::before { left:14px; }
.hero-board::after  { right:14px; }
.hero h1 {
  font-family:'Rye', cursive;
  font-size:clamp(22px, 3.5vw, 42px);
  color:var(--lantern-glow);
  text-shadow:0 0 30px rgba(255,200,50,0.4), 0 3px 6px rgba(0,0,0,0.9);
  line-height:1.2; letter-spacing:0.03em;
}
.hero p {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:14px; color:var(--parchment2); margin-top:10px; opacity:0.8;
}

.section-plank { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.plank-title {
  background:var(--wood-plank);
  border:2px solid var(--bark); border-radius:4px;
  padding:6px 18px;
  font-family:'Rye', cursive; font-size:13px;
  color:var(--straw-light); letter-spacing:0.08em;
  box-shadow:3px 3px 0 var(--wood-dark);
}
.plank-line {
  flex:1; height:2px;
  background:repeating-linear-gradient(90deg, var(--bark) 0, var(--bark) 8px, transparent 8px, transparent 12px);
  opacity:0.5;
}

/* === CARDS === */
.games-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:24px;
}
.game-card {
  position:relative; border-radius:8px; overflow:hidden;
  cursor:pointer;
  animation:appear 0.6s ease both;
  transition:transform 0.25s, box-shadow 0.25s;
  background:
    repeating-linear-gradient(178deg,
      var(--wood-mid) 0px, var(--wood-mid) 40px,
      var(--bark) 40px, var(--bark) 42px
    );
  border:3px solid var(--wood-dark);
  box-shadow:5px 5px 0 var(--wood-dark), inset 0 1px 0 rgba(255,200,100,0.08);
}
.game-card:nth-child(1){animation-delay:.1s}
.game-card:nth-child(2){animation-delay:.2s}
.game-card:nth-child(3){animation-delay:.3s}
.game-card:nth-child(4){animation-delay:.4s}
.game-card:hover {
  transform:translateY(-5px) rotate(-0.5deg);
  box-shadow:8px 12px 0 var(--wood-dark), 0 0 20px rgba(200,160,60,0.2);
}

.card-banner {
  height:130px; display:flex; align-items:center; justify-content:center;
  position:relative; overflow:hidden; font-size:52px;
}
.banner-fishing1 { background:linear-gradient(160deg,#0a1e35 0%,#0c3b6e 60%,#1460a0 100%); }
.banner-fishing2 { background:linear-gradient(160deg,#0a1e15 0%,#0c4e28 60%,#148040 100%); }
.banner-klevoe   { background:linear-gradient(160deg,#2a1a08 0%,#5a3a10 60%,#8a6020 100%); }
.banner-graffiti { background:linear-gradient(160deg,#0a0a0a 0%,#1a0a2a 50%,#2a0a1a 100%); position:relative; }
.banner-graffiti::before {
  content:''; position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(ellipse 60% 80% at 30% 50%, rgba(255,80,0,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 75% 40%, rgba(120,0,255,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 55% 70%, rgba(0,200,255,0.12) 0%, transparent 55%);
}
.card-banner::after {
  content:''; position:absolute; inset:0;
  background:
    repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px),
    linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, transparent 40%, rgba(0,0,0,0.4) 100%);
}

.status-nail {
  position:absolute; top:10px; right:10px; z-index:2;
  padding:3px 10px; border-radius:3px;
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:10px; letter-spacing:0.08em;
}
.nail-active  { background:rgba(74,107,42,0.85); color:#a8e070; border:1px solid #6b9e3a; }
.nail-archive { background:rgba(120,60,20,0.85); color:#e0a070; border:1px solid #8b3a1a; }

.card-body { padding:16px 18px 20px; }
.card-num {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:10px; color:var(--muted); margin-bottom:4px;
}
.card-title {
  font-family:'Rye', cursive; font-size:14px;
  color:var(--straw-light); line-height:1.35; margin-bottom:8px;
  text-shadow:0 1px 3px rgba(0,0,0,0.6);
}
.card-desc {
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:12px; color:var(--parchment2); line-height:1.6; margin-bottom:14px; opacity:.85;
}
.card-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.tag {
  padding:2px 8px; border-radius:3px;
  font-size:10px; font-family:'IM Fell English',serif; border:1px solid;
}
.tag-active  { background:rgba(74,107,42,0.2); border-color:rgba(107,158,58,0.4); color:#a0d060; }
.tag-archive { background:rgba(100,60,20,0.2); border-color:rgba(139,58,26,0.4); color:#c8956a; }

.play-btn {
  width:100%; padding:11px; border-radius:4px; border:none;
  font-family:'Rye', cursive; font-size:12px; letter-spacing:.06em;
  cursor:pointer; transition:all .15s; position:relative; overflow:hidden;
}
.play-btn::after {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg, transparent 0, transparent 15px, rgba(255,255,255,0.03) 15px, rgba(255,255,255,0.03) 16px);
}
.btn-active {
  background:linear-gradient(180deg, var(--moss-light) 0%, var(--moss) 100%);
  color:var(--lantern-glow);
  box-shadow:0 4px 0 #2a4a12, inset 0 1px 0 rgba(255,255,255,0.15);
  text-shadow:0 1px 2px rgba(0,0,0,0.5);
}
.btn-active:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #2a4a12; }
.btn-active:active { transform:translateY(2px);  box-shadow:0 2px 0 #2a4a12; }
.btn-archive {
  background:linear-gradient(180deg, var(--rust) 0%, #5a2010 100%);
  color:var(--parchment2);
  box-shadow:0 4px 0 #3a0e08, inset 0 1px 0 rgba(255,255,255,0.1);
  text-shadow:0 1px 2px rgba(0,0,0,0.6);
}
.btn-archive:hover  { transform:translateY(-2px); box-shadow:0 6px 0 #3a0e08; }
.btn-archive:active { transform:translateY(2px);  box-shadow:0 2px 0 #3a0e08; }

/* === NEWS SCROLL === */
.scroll-wrap {
  background:linear-gradient(180deg,#2e1c08 0%,var(--wood-mid) 100%);
  border:2px solid var(--bark); border-radius:6px;
  padding:8px;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.4);
}
.news-list { display:flex; flex-direction:column; }
.news-item {
  display:grid; grid-template-columns:10px 1fr auto;
  gap:12px; align-items:start;
  padding:14px 16px;
  border-bottom:1px solid rgba(100,60,20,0.3);
  transition:background .2s;
  animation:appear .5s ease both;
}
.news-item:last-child { border-bottom:none; }
.news-item:hover { background:rgba(255,200,100,0.04); }
.news-knot { width:10px; height:10px; border-radius:50%; margin-top:5px; flex-shrink:0; }
.knot-klevoe  { background:var(--lantern); box-shadow:0 0 8px rgba(245,160,32,0.6); }
.knot-fishing { background:var(--sky);     box-shadow:0 0 8px rgba(122,179,212,0.5); }
.knot-system  { background:var(--muted); }
.knot-graffiti{ background:#ff4400; box-shadow:0 0 8px rgba(255,68,0,0.7); }
.news-content { min-width:0; }
.news-game { font-family:'Rye',cursive; font-size:9px; color:var(--muted); letter-spacing:.15em; margin-bottom:3px; }
.news-title { font-family:'Philosopher',serif; font-weight:700; font-size:13px; color:var(--parchment); line-height:1.3; margin-bottom:4px; }
.news-body { font-family:'IM Fell English',serif; font-style:italic; font-size:12px; color:var(--parchment2); line-height:1.5; opacity:.8; }
.news-date { font-family:'IM Fell English',serif; font-style:italic; font-size:10px; color:var(--muted); white-space:nowrap; }

/* === GAME VIEW (iframe) === */
.game-view { display:none; flex:1; flex-direction:column; min-height:0; overflow:hidden; max-width:100vw; }
.game-view.visible { display:flex; position:fixed; inset:0; z-index:500; flex-direction:column; }

.game-topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; height:56px; flex-shrink:0;
  background:
    repeating-linear-gradient(180deg,
      var(--wood-plank) 0, var(--wood-plank) 54px,
      var(--bark) 54px, var(--bark) 56px
    );
  border-bottom:3px solid var(--wood-dark);
  box-shadow:0 4px 16px rgba(0,0,0,0.5);
}
.game-title-bar { display:flex; align-items:center; gap:12px; }
.gbar-icon { font-size:24px; }
.gbar-name { font-family:'Rye',cursive; font-size:14px; color:var(--lantern-glow); text-shadow:0 0 12px rgba(255,200,50,0.4); }
.gbar-sub  { font-family:'IM Fell English',serif; font-style:italic; font-size:11px; color:var(--muted); margin-top:1px; }
.topbar-btns { display:flex; gap:8px; }
.tbar-btn {
  padding:7px 14px; border-radius:4px;
  border:2px solid var(--bark); background:var(--wood-mid);
  color:var(--parchment2); font-family:'IM Fell English',serif; font-size:12px;
  cursor:pointer; transition:all .15s; box-shadow:0 3px 0 var(--wood-dark);
}
.tbar-btn:hover  { background:var(--wood-plank); transform:translateY(-1px); }
.tbar-btn:active { transform:translateY(2px); box-shadow:0 1px 0 var(--wood-dark); }

.game-iframe-wrap { flex:1; position:relative; background:#000; min-height:0; overflow:hidden; }
.game-iframe-wrap iframe { width:100%; height:100%; border:none; display:block; position:absolute; inset:0; }
.iframe-loading {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
  background:var(--wood-dark); pointer-events:none; transition:opacity .4s;
}
.iframe-loading.hidden { opacity:0; }
.loader-mill { font-size:48px; animation:spin 1.5s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader-txt { font-family:'Rye',cursive; font-size:13px; color:var(--straw); letter-spacing:.15em; text-shadow:0 0 12px rgba(200,160,50,0.4); }

/* === FOOTER === */
footer {
  background:
    repeating-linear-gradient(180deg, var(--bark) 0, var(--bark) 38px, var(--wood-dark) 38px, var(--wood-dark) 40px);
  border-top:3px solid var(--wood-dark);
  padding:0 32px; height:44px;
  display:flex; align-items:center; justify-content:space-between;
  font-family:'IM Fell English',serif; font-style:italic; font-size:11px; color:var(--muted);
}
.footer-seal {
  padding:3px 12px; background:var(--wood-dark);
  border:1px solid var(--straw); border-radius:3px;
  font-family:'Rye',cursive; font-size:9px; color:var(--straw); letter-spacing:.1em;
}
</style>
</head>
<body>

<div class="leaves" id="leaves"></div>

<div class="wrapper">

  <header>
    <div class="logo-sign">
      <div class="logo-title">🏡 Chupepp Games</div>
      <div class="logo-sub">Игровой Лаунчер · v1.0</div>
    </div>
    <div class="lanterns">
      <div class="lantern-item active" id="nav-home" onclick="showHome()">
        <div class="lantern-body">🏠</div>
        <div class="lantern-label">Главная</div>
      </div>
      <div class="lantern-item" id="nav-archive" onclick="showArchive()">
        <div class="lantern-body">📜</div>
        <div class="lantern-label">Архив</div>
      </div>
      <div class="lantern-item" id="nav-news" onclick="showNews()">
        <div class="lantern-body">📰</div>
        <div class="lantern-label">Новости</div>
      </div>
    </div>
  </header>

  <!-- HOME -->
  <div id="home-view" class="home-view">
    <div class="hero">
      <div class="hero-board">
        <h1>Все Игры Деревни</h1>
        <p>Выбери игру — сыграй прямо здесь, в лаунчере</p>
      </div>
    </div>
    <div>
      <div class="section-plank">
        <div class="plank-title">✅ Активные Игры</div>
        <div class="plank-line"></div>
      </div>
      <div class="games-grid" id="active-grid"></div>
    </div>
    <div>
      <div class="section-plank">
        <div class="plank-title" style="background:var(--rust);color:var(--parchment2);">📦 Архив Закрытых</div>
        <div class="plank-line"></div>
      </div>
      <div class="games-grid" id="archive-grid"></div>
    </div>
    <div>
      <div class="section-plank">
        <div class="plank-title">📰 Свежие Новости</div>
        <div class="plank-line"></div>
      </div>
      <div class="scroll-wrap">
        <div class="news-list" id="news-home"></div>
      </div>
    </div>
  </div>

  <!-- GAME VIEW -->
  <div id="game-view" class="game-view">
    <div class="game-topbar">
      <div class="game-title-bar">
        <div class="gbar-icon" id="gbar-icon">🏡</div>
        <div>
          <div class="gbar-name" id="gbar-name">Клёвое Место</div>
          <div class="gbar-sub"  id="gbar-sub">Активная игра</div>
        </div>
      </div>
      <div class="topbar-btns">
        <button class="tbar-btn" onclick="reloadGame()">🔄 Заново</button>
        <button class="tbar-btn" onclick="openFullscreen()">⛶ На весь экран</button>
        <button class="tbar-btn" onclick="showHome()">← Главная</button>
      </div>
    </div>
    <div class="game-iframe-wrap">
      <div class="iframe-loading" id="iframe-loading">
        <div class="loader-mill">⚙️</div>
        <div class="loader-txt">Загружаем игру...</div>
      </div>
      <iframe id="game-iframe" src="" allowfullscreen></iframe>
    </div>
  </div>

  <footer>
    <span>© Chupepp Games · Все четыре игры в одном месте</span>
    <div class="footer-seal">v1.0.0</div>
  </footer>
</div>

<script>
// ======== ДАННЫЕ =========
const GAMES = [
  {
    id:2, name:'Клёвое Место', icon:'🏡',
    sub:'Idle Строитель · Активна',
    desc:'Деревянная деревня, конвейеры, NPC, фермы и рыбный дом. Строй и развивай!',
    tags:['Idle','Стройка','NPC','Конвейеры'],
    url:'https://chupepro.github.io/FishOnlReb/te.html',
    active:true, banner:'banner-klevoe'
  },
  {
    id:3, name:'Graffiti Pro', icon:'🎨',
    sub:'Граффити-Редактор · Активна',
    desc:'Рисуй граффити баллончиком на тёмных стенах. Шаблоны, лутбоксы с редкими красками и монеты за завершённые работы!',
    tags:['Творчество','Рисование','Лутбоксы','Краски'],
    url:'https://chupepro.github.io/FishOnlReb/graffiti-1.html',
    active:true, banner:'banner-graffiti'
  }

// ======== РЕНДЕР =========
function cardHTML(g, isArchive) {
  const tc = isArchive ? 'tag-archive' : 'tag-active';
  const bc = isArchive ? 'btn-archive' : 'btn-active';
  const bt = isArchive ? '📜 Открыть Архив' : '▶ Играть';
  const nc = isArchive ? 'nail-archive' : 'nail-active';
  const nt = isArchive ? '📦 Архив' : '✅ Активна';
  return `
    <div class="game-card" onclick="launchGame(${g.id})">
      <div class="card-banner ${g.banner}">${g.icon}
        <div class="status-nail ${nc}">${nt}</div>
      </div>
      <div class="card-body">
        <div class="card-num">// 00${g.id+1}</div>
        <div class="card-title">${g.name}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="card-tags">${g.tags.map(t=>`<span class="tag ${tc}">${t}</span>`).join('')}</div>
        <button class="play-btn ${bc}" onclick="event.stopPropagation();launchGame(${g.id})">${bt}</button>
      </div>
    </div>`;
}

function renderNews(el, limit) {
  const items = limit ? NEWS.slice(0,limit) : NEWS;
  el.innerHTML = items.map((n,i)=>`
    <div class="news-item" style="animation-delay:${i*.06}s">
      <div class="news-knot ${n.knot}"></div>
      <div class="news-content">
        <div class="news-game">${n.game}</div>
        <div class="news-title">${n.title}</div>
        <div class="news-body">${n.body}</div>
      </div>
      <div class="news-date">${n.date}</div>
    </div>`).join('');
}

// ======== НАВИГАЦИЯ =========
function setNav(id) {
  document.querySelectorAll('.lantern-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  document.getElementById('home-view').style.display = 'flex';
  document.getElementById('game-view').classList.remove('visible');
  document.querySelector('footer').style.display = '';
  document.getElementById('active-grid').innerHTML  = GAMES.map(g=>cardHTML(g,false)).join('');
  document.getElementById('archive-grid').innerHTML = ARCHIVED.map(g=>cardHTML(g,true)).join('');
  renderNews(document.getElementById('news-home'), 4);
  setNav('nav-home');
  window.scrollTo({top:0, behavior:'smooth'});
}

function showArchive() {
  showHome(); setNav('nav-archive');
  setTimeout(()=>document.getElementById('archive-grid').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function showNews() {
  showHome(); setNav('nav-news');
  renderNews(document.getElementById('news-home'), NEWS.length);
  setTimeout(()=>document.getElementById('news-home').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function launchGame(id) {
  const g = [...GAMES,...ARCHIVED].find(x=>x.id===id);
  if (!g) return;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('game-view').classList.add('visible');
  document.querySelector('footer').style.display = 'none';
  document.getElementById('gbar-icon').textContent = g.icon;
  document.getElementById('gbar-name').textContent = g.name;
  document.getElementById('gbar-sub').textContent  = g.sub;
  const iframe  = document.getElementById('game-iframe');
  const loading = document.getElementById('iframe-loading');
  loading.classList.remove('hidden');
  iframe.src = g.url;
  iframe.onload = ()=>setTimeout(()=>loading.classList.add('hidden'), 300);
}

function reloadGame() {
  const iframe  = document.getElementById('game-iframe');
  const loading = document.getElementById('iframe-loading');
  loading.classList.remove('hidden');
  const src = iframe.src; iframe.src=''; iframe.src=src;
  iframe.onload = ()=>setTimeout(()=>loading.classList.add('hidden'), 300);
}

function openFullscreen() {
  const el = document.getElementById('game-iframe');
  (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);
}

// ======== ЛИСТЬЯ =========
const LEAFS=['🍂','🍁','🌿','🍃'];
function spawnLeaves(){
  const c=document.getElementById('leaves');
  for(let i=0;i<20;i++){
    const l=document.createElement('div');
    l.className='leaf';
    l.textContent=LEAFS[Math.floor(Math.random()*LEAFS.length)];
    l.style.left=(Math.random()*100)+'vw';
    l.style.animationDuration=(10+Math.random()*14)+'s';
    l.style.animationDelay=(Math.random()*16)+'s';
    l.style.fontSize=(10+Math.random()*10)+'px';
    c.appendChild(l);
  }
}

spawnLeaves();
showHome();
</script>

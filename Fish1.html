<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ошибка 1234 - Рыбалка Онлайн: Реборн</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #2d1b0d;
            background-image: radial-gradient(#3e2712 1px, transparent 1px);
            background-size: 20px 20px;
            color: #fef3c7;
            font-family: 'Georgia', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Текстура дерева для контейнера */
        .wood-panel {
            background: #5d4037;
            background-image: linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                              linear-gradient(rgba(0,0,0,0.2) 1px, transparent 1px);
            border: 8px solid #3e2723;
            border-radius: 4px;
            box-shadow: 
                inset 0 0 50px rgba(0,0,0,0.5),
                0 20px 40px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem 1.5rem;
            position: relative;
            text-align: center;
            border-style: double;
        }

        /* Гвозди по углам */
        .nail {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #455a64;
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5), 2px 2px 5px rgba(0,0,0,0.5);
        }
        .top-left { top: 10px; left: 10px; }
        .top-right { top: 10px; right: 10px; }
        .bottom-left { bottom: 10px; left: 10px; }
        .bottom-right { bottom: 10px; right: 10px; }

        .paper-note {
            background: #fff9c4;
            color: #4e342e;
            padding: 1rem;
            margin: 1.5rem 0;
            transform: rotate(-1deg);
            box-shadow: 3px 3px 10px rgba(0,0,0,0.3);
            border-radius: 2px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-align: left;
            border-left: 4px solid #d84315;
        }

        /* Кнопки для мобильных устройств (крупные тач-зоны) */
        .btn-wood {
            background: #8d6e63;
            border: 3px solid #3e2723;
            color: white;
            padding: 1rem;
            width: 100%;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 0 #3e2723;
            active-transform: translateY(4px);
            transition: all 0.1s;
            display: block;
        }

        .btn-wood:active {
            box-shadow: 0 0 0 #3e2723;
            transform: translateY(4px);
        }

        .btn-exit {
            background: transparent;
            color: #bcaaa4;
            text-decoration: underline;
            font-size: 0.9rem;
            margin-top: 10px;
            border: none;
            width: 100%;
        }

        .fish-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .stamp {
            position: absolute;
            bottom: -20px;
            right: 10px;
            width: 80px;
            height: 80px;
            border: 4px solid #c62828;
            border-radius: 50%;
            color: #c62828;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.7rem;
            transform: rotate(15deg);
            opacity: 0.6;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="wood-panel">
        <div class="nail top-left"></div>
        <div class="nail top-right"></div>
        <div class="nail bottom-left"></div>
        <div class="nail bottom-right"></div>

        <div class="fish-icon">𓆝</div>

        <h1 class="text-3xl font-black mb-1 uppercase">Оборвалось!</h1>
        <p class="text-amber-200 text-sm opacity-80">Рыбалка Онлайн: Реборн закрывается</p>

        <div class="paper-note">
            <div class="text-xs text-gray-500 mb-1">СИСТЕМНОЕ УВЕДОМЛЕНИЕ:</div>
            <div class="text-lg">ОШИБКА 1234</div>
            <div class="mt-2 text-sm">
                Игра Скучная.Нечего делать.<br>
                Нету интереса.<br>
                Простите прошу.
            </div>
        </div>

        <p class="mb-6 text-sm italic opacity-90 px-2">
            Обновлять нечего.Ждите других игр
        </p>

        <div class="px-2">
            <button onclick="location.reload()" class="btn-wood">Зайти снова</button>
            <button onclick="window.close()" class="btn-exit">Уйти в деревню</button>
        </div>

        <div class="stamp">
            ИГРА<br>ЗАКРЫТА
        </div>
    </div>

    <script>
        // Добавляем легкую вибрацию при нажатии (на поддерживаемых устройствах)
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if ('vibrate' in navigator) {
                    navigator.vibrate(50);
                }
            });
        });
    </script>
</body>
</html>

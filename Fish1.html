<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыбалка Онлайн: Реборн - КРИТИЧЕСКАЯ ОШИБКА</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes hammer-swing {
            0% { transform: rotate(0deg); }
            15% { transform: rotate(-40deg); }
            25% { transform: rotate(10deg); }
            35% { transform: rotate(-5deg); }
            45% { transform: rotate(0deg); }
            100% { transform: rotate(0deg); }
        }

        .hammer-container {
            position: relative;
            cursor: pointer;
            user-select: none;
            z-index: 10;
        }

        .hammer {
            font-size: 120px;
            display: inline-block;
            transform-origin: bottom right;
            animation: hammer-swing 1s infinite;
        }

        .particle {
            position: absolute;
            pointer-events: none;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 16px;
            color: #ef4444; /* Красный цвет для ошибок кода */
            white-space: nowrap;
            opacity: 0;
            z-index: 5;
        }

        @keyframes particle-fly {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tw-x), var(--tw-y)) rotate(var(--tw-r));
                opacity: 0;
            }
        }

        .dust-floor {
            width: 140px;
            height: 12px;
            background: rgba(0, 0, 0, 0.07);
            border-radius: 50%;
            margin: -15px auto 0;
        }

        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            100% { transform: translate(1px, 1px) rotate(0deg); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center max-w-2xl">
        <!-- Анимация молотка и вылетающего кода -->
        <div id="repair-zone" class="relative mb-16 flex flex-col items-center">
            <div class="hammer-container" id="hammer-box">
                <div class="hammer">🔨</div>
            </div>
            <div class="dust-floor"></div>
        </div>

        <!-- Текстовый блок -->
        <h1 class="text-5xl md:text-6xl font-black text-red-600 mb-6 uppercase tracking-tighter shake">
            КРИТИЧЕСКАЯ ОШИБКА!
        </h1>
        
        <p class="text-2xl md:text-3xl text-gray-800 mb-4 font-semibold">
            В игре произошел полный крах...
        </p>
        
        <p class="text-xl text-gray-600 mb-10 leading-relaxed italic">
            Вместо рыб приплыли злые крабы 😨 Но не бойся!<br>
            <span class="text-blue-600 font-bold not-italic">Боб Строитель Анар</span> уже выбивает лишний код молотком.
        </p>

        <!-- Зона испуганных крабов -->
        <div class="flex items-center justify-center space-x-8 text-5xl mb-12">
            <span class="shake" style="animation-delay: 0.1s">🦀</span>
            <span class="shake" style="animation-delay: 0.3s">🦀</span>
            <span class="shake" style="animation-delay: 0.5s">🦀</span>
        </div>

        <!-- Сообщение о невозможности входа -->
        <div class="bg-gray-100 border-l-4 border-gray-500 p-4 text-left inline-block">
            <p class="text-gray-700 font-mono text-sm">
                > status: ACCESS_DENIED<br>
                > error_origin: CRAB_INVASION<br>
                > repair_status: ANAR_WORKING
            </p>
        </div>
    </div>

    <script>
        const hammerBox = document.getElementById('hammer-box');
        // Ошибки, которые вылетают при ударе
        const codeSnippets = [
            'TypeError', 'CRAB_ERROR', '404_FISH_NOT_FOUND', 'SEGFAULT', 
            'null_pointer', 'REBORN_CRASH', 'SYSTEM_FAILURE', '🦀_ATTACK',
            'undefined', 'stack_overflow', 'ANAR_FIXING'
        ];

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            particle.innerText = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
            
            // Позиция появления
            particle.style.left = `50%`;
            particle.style.bottom = `30px`;

            // Траектория полета (врассыпную вверх)
            const angle = (Math.random() * Math.PI) + Math.PI; 
            const distance = 120 + Math.random() * 180;
            const destX = Math.cos(angle) * distance;
            const destY = Math.sin(angle) * distance;
            const rotation = (Math.random() - 0.5) * 1000;

            particle.style.setProperty('--tw-x', `${destX}px`);
            particle.style.setProperty('--tw-y', `${destY}px`);
            particle.style.setProperty('--tw-r', `${rotation}deg`);

            particle.style.animation = 'particle-fly 0.7s cubic-bezier(0.1, 0.5, 0.5, 1) forwards';

            hammerBox.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 700);
        }

        // Авто-удары молотка
        setInterval(() => {
            for(let i = 0; i < 4; i++) {
                setTimeout(createParticle, i * 70);
            }
        }, 1000);

        // Ручной ремонт
        hammerBox.addEventListener('mousedown', () => {
            for(let i = 0; i < 10; i++) {
                createParticle();
            }
        });
    </script>
</body>
</html>
